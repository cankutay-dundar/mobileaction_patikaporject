server:
port: 8080

spring:
datasource:
url: jdbc:h2:mem:airqdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
username: sa
password: ""
jpa:
hibernate:
ddl-auto: update
show-sql: false
h2:
console:
enabled: true
path: /h2-console

logging:
level:
root: INFO
com.patika.airquality: INFO

app:
owm:
apiKey: ${OWM_API_KEY:bbc906206166b001ef5835ec196e56c6}
baseUrl: https://api.openweathermap.org
timeoutMillis: 6000
constraints:
earliestDate: 2020-11-27
allowedCities:
- London
- Barcelona
- Ankara
- Tokyo
- Mumbai
# CAQI-like breakpoints (EXAMPLE VALUES ONLY – please adjust per spec/table)
# Provide 5 ascending numeric cut points per pollutant to create 6 categories:
# [Good, Satisfactory, Moderate, Poor, Severe, Hazardous]
# Units expected from OWM are µg/m3 for components.
caqi:
thresholds:
co: [200, 400, 800, 1600, 3200]
so2: [20, 40, 80, 160, 320]
o3: [60, 120, 180, 240, 300]
